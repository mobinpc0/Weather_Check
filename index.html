<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>

  <!-- Our own stylesheet -->
  <link rel="stylesheet" href="style.css" />

  <!-- Google Font: Poppins (clean and easy to read) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Weather Icons library: gives us icons like sun, rain, cloud etc. -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css" />
</head>

<body>

  <!-- BACKGROUND: weather station photo (low opacity set in CSS) -->
  <div class="bg-photo"></div>

  <!-- MAIN WRAPPER: centers everything on the page -->
  <div class="page">

    <!-- SEARCH BAR -->
    <form id="search-form">
      <input type="text" id="search-input" placeholder="🔍  Search a city..." autocomplete="off" />
      <button type="submit">Search</button>
    </form>

    <!-- WEATHER CARD -->
    <div class="card">

      <!-- City name and date/time -->
      <p class="city" id="city">Dhaka</p>
      <p class="date" id="date">Monday, Feb 6 2026</p>

      <!-- Temperature + weather icon side by side -->
      <div class="main-row">

        <!-- Temperature: the number + °C unit -->
        <div class="temp-box">
          <span id="temp">20</span>
          <span class="unit">°C</span>
        </div>

        <!-- Weather icon (changes based on condition) -->
        <i class="wi wi-day-fog weather-icon" id="weather-icon"></i>

      </div>

      <!-- Weather condition text e.g. "Sunny", "Mist" -->
      <p class="condition" id="condition">Mist</p>

      <!-- Extra info row: humidity, wind, visibility -->
      <div class="info-row">

        <div class="info-box">
          <span class="info-icon">💧</span>
          <span class="info-label">Humidity</span>
          <span class="info-value" id="humidity">—</span>
        </div>

        <div class="info-box">
          <span class="info-icon">💨</span>
          <span class="info-label">Wind</span>
          <span class="info-value" id="wind">—</span>
        </div>

        <div class="info-box">
          <span class="info-icon">👁️</span>
          <span class="info-label">Visibility</span>
          <span class="info-value" id="visibility">—</span>
        </div>

      </div>

    </div>

    <!-- Error message (shown if city not found) -->
    <p class="error" id="error"></p>

  </div>

  <!-- Our JavaScript file -->
  <script src="script.js"></script>

</body>
</html>
