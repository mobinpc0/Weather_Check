<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css"/>
</head>
<body>

  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <div class="container">

    <nav>
      <form id="search-form">
        <div class="search-wrapper">
          <span class="search-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </span>
          <input type="text" placeholder="Search city or location…" class="search_area" autocomplete="off"/>
          <button type="submit">Search</button>
        </div>
      </form>
    </nav>

    <div class="weather_container">

      <div class="time_location">
        <div class="location-row">
          <svg class="pin-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          <p class="location-name">Dhaka</p>
        </div>
        <span class="datetime">12:58 — Monday, Feb 6 2026</span>
      </div>

      <div class="weather-main">
        <div class="temp-block">
          <div class="temp"><span class="temp-value">20</span><span class="unit">°C</span></div>
          <div class="feels-like">Feels like <span id="feels-like-val">—</span>°C</div>
        </div>
        <div class="condition-block">
          <i class="wi wi-day-fog condition-icon" id="weather-icon"></i>
          <p class="condition condition-text">Mist</p>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>
          <span class="stat-label">Humidity</span>
          <span class="stat-value" id="humidity">—</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>
          <span class="stat-label">Wind</span>
          <span class="stat-value" id="wind">—</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <span class="stat-label">UV Index</span>
          <span class="stat-value" id="uv">—</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <span class="stat-label">Visibility</span>
          <span class="stat-value" id="visibility">—</span>
        </div>
      </div>

    </div>

    <p class="error-msg" id="error-msg"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
